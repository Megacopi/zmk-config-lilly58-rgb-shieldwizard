# Battery report interval in seconds (increased to save power)
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=300
# Increase keyboard debounce
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=5
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=5
# Use default BLE transmission power for better battery life
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
# Change keyboard default display name
CONFIG_ZMK_KEYBOARD_NAME="Lily58"
# Fix Windows battery reporting related errors
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n

# OLED related configuration (optimized for battery)
#CONFIG_ZMK_DISPLAY=y
#CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=n
# Minimal widgets to save power - only essential ones
# CONFIG_ZMK_WIDGET_WPM_STATUS=y
#CONFIG_ZMK_WIDGET_LAYER_STATUS=y
# CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y
#CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
#CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y

#CONFIG_ZMK_WIDGET_PERIPHERAL_STATUS=n
# Bongo cat keyboard animation
#CONFIG_ZMK_WIDGET_BONGO_CAT=y
#CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y

# Sleep related configuration (optimized for battery)
# Milliseconds of inactivity before entering idle state (1 minute)
CONFIG_ZMK_IDLE_TIMEOUT=0
# Deep sleep disabled to prevent split halves from sleeping independently
CONFIG_ZMK_SLEEP=n

# BT Radio nicht schlafen lassen
CONFIG_BT_CTLR_SLEEP_CLOCK_ACCURACY=500
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# ZMK Studio related configuration
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n
CONFIG_ZMK_STUDIO_LOCK_ON_DISCONNECT=n

# RGB related configuration (optimized for battery)
#CONFIG_ZMK_RGB_UNDERGLOW=y
#CONFIG_WS2812_STRIP=y
# Turn off RGB when keyboard enters idle state
#CONFIG_ZMK_BACKLIGHT_AUTO_OFF_IDLE=y
#CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y
#CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n
# Start with solid color effect (more battery efficient)
#CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=0
# Reduce maximum brightness for battery savings
#CONFIG_ZMK_RGB_UNDERGLOW_BRT_MAX=30
# Turn off RGB on deep sleep
#CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_USB=y

# Rotary encoder configuration
#CONFIG_EC11=y
#CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Enable mouse support (smooth scrolling disabled for battery)
#CONFIG_ZMK_POINTING=y
# CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y

# Enable Battery Level Reporting for both splits
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# Verbindungsparameter lockerer machen
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400

# Verbindung stabiler machen
CONFIG_BT_GAP_AUTO_UPDATE_CONN_PARAMS=y

# In .conf hinzufügen
CONFIG_BT_BUF_ACL_RX_SIZE=69
CONFIG_BT_BUF_ACL_TX_SIZE=69
CONFIG_BT_L2CAP_TX_BUF_COUNT=6